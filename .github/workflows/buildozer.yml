name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/kivy/buildozer:latest
      options: --user root
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Buildozer
        run: |
          # 1. Clear any cached artifacts from previous failed runs
          rm -rf .buildozer
          
          # 2. Install the necessary build tools via pip
          pip install Cython==0.29.33 buildozer
          
          # 3. Execute the build process safely
          yes y | BUILDOZER_ALLOW_ROOT=1 buildozer android debug

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
