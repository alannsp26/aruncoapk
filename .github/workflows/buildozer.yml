name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11 and Build Environment
        run: |
          # Add the deadsnakes PPA to get access to python3.11
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          
          # Install python3.11 and dependencies
          sudo apt-get install -y python3.11 python3.11-venv python3.11-dev
          
          # FIXED: Added --system-site-packages to allow p4a's --user installs
          sudo python3.11 -m venv --system-site-packages /opt/venv
          sudo chown -R $USER:$USER /opt/venv
          export PATH="/opt/venv/bin:$PATH"
          
          # Install Kivy/Buildozer dependencies
          pip install --upgrade pip
          pip install "Cython==0.29.33" "buildozer"

      - name: Build with Buildozer
        run: |
          export PATH="/opt/venv/bin:$PATH"
          
          # The ultimate memory fix that saved the Gradle build
          export _JAVA_OPTIONS="-Xmx3g -XX:+UseG1GC"
          export GRADLE_OPTS="-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"
          
          # Clean up any leftover junk
          rm -rf .buildozer
          
          # Initial run to generate the directory structure
          yes y | BUILDOZER_ALLOW_ROOT=1 buildozer android debug || true
          
          # Manual Gradle performance injections
          echo "org.gradle.jvmargs=-Xmx3g -XX:+UseG1GC" >> .buildozer/android/platform/build-arm64-v8a_armeabi-v7a/dists/*/gradle.properties
          echo "org.gradle.parallel=false" >> .buildozer/android/platform/build-arm64-v8a_armeabi-v7a/dists/*/gradle.properties
          echo "org.gradle.daemon=false" >> .buildozer/android/platform/build-arm64-v8a_armeabi-v7a/dists/*/gradle.properties
          echo "org.gradle.configureondemand=true" >> .buildozer/android/platform/build-arm64-v8a_armeabi-v7a/dists/*/gradle.properties    
          
          # Set the build to be offline so it doesn't try to redownload Gradle
          echo "org.gradle.offline=true" >> .buildozer/android/platform/build-arm64-v8a_armeabi-v7a/dists/*/gradle.properties
          
          # The final build command
          yes y | BUILDOZER_ALLOW_ROOT=1 buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          # Changed to match your new app name
          name: aruco-scanner-apk
          path: bin/*.apk
