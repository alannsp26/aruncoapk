name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      # Use a stable, older tag or ensure the container environment is handled
      # If 'latest' is 3.14, we need to explicitly create a 3.11 venv
      image: ghcr.io/kivy/buildozer:latest
      options: --user root
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11 and Build Environment
        run: |
          # The container default might be 3.14. Let's create a 3.11 venv
          apt-get update && apt-get install -y python3.11 python3.11-venv
          python3.11 -m venv /opt/venv
          export PATH="/opt/venv/bin:$PATH"
          
          # Install dependencies into the 3.11 venv
          pip install --upgrade pip
          pip install "Cython==0.29.33" "buildozer"

      - name: Build with Buildozer
        run: |
          # Use the 3.11 environment
          export PATH="/opt/venv/bin:$PATH"
          
          # Clear any cached artifacts from previous failed runs
          rm -rf .buildozer
          
          # Execute the build process safely
          yes y | BUILDOZER_ALLOW_ROOT=1 buildozer android debug

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
