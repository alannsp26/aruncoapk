name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update
          # Install core build dependencies for Ubuntu 24.04
          sudo apt-get install -y python3.11 python3.11-venv python3.11-dev \
            build-essential libtool libtool-bin autoconf automake pkg-config \
            libffi-dev libssl-dev zip unzip
            
          sudo python3.11 -m venv /opt/venv
          export PATH="/opt/venv/bin:$PATH"
          pip install --upgrade pip
          pip install "Cython==0.29.33" "buildozer"

      - name: Build with Buildozer
        run: |
          export PATH="/opt/venv/bin:$PATH"
          export _JAVA_OPTIONS="-Xmx3g -XX:+UseG1GC"
          export GRADLE_OPTS="-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"
          
          # Force clean the workspace to remove any old, incompatible build artifacts
          rm -rf .buildozer
          
          # Build
          yes y | BUILDOZER_ALLOW_ROOT=1 buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aruco-scanner-apk
          path: bin/*.apk
