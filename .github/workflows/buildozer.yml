name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/kivy/buildozer:latest
      options: --user root
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Buildozer
        run: |
          # 1. Install Python 3.11 via deadsnakes PPA
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y python3.11 python3.11-dev python3.11-venv
          
          # 2. Clear out any bad cache artifacts
          rm -rf .buildozer
          
          # 3. Create and activate a Virtual Environment using Python 3.11
          # This completely isolates our build from the Debian system packages!
          python3.11 -m venv my_build_env
          source my_build_env/bin/activate
          
          # 4. Install dependencies INSIDE the virtual environment
          pip install Cython==0.29.33
          pip install buildozer
          
          # 5. Execute the build process safely isolated
          yes y | BUILDOZER_ALLOW_ROOT=1 buildozer android debug
