name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/kivy/buildozer:latest
      options: --user root
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Buildozer
        run: |
          # 1. Install prerequisites and Python 3.11 via deadsnakes PPA
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y python3.11 python3.11-dev python3.11-venv
          
          # 2. Clear out any bad cache artifacts
          rm -rf .buildozer
          
          # FIX: Force pip to allow installation of packages inside the 3.11 environment
          # This overrides PEP 668 managed environment restrictions safely inside a container
          /usr/bin/python3.11 -m pip config set global.break-system-packages true
          
          # 3. Target Python 3.11 explicitly to install its core dependencies
          /usr/bin/python3.11 -m pip install Cython==0.29.33
          /usr/bin/python3.11 -m pip install buildozer
          
          # 4. Execute the build process safely under 3.11
          yes y | BUILDOZER_ALLOW_ROOT=1 /usr/bin/python3.11 -m buildozer android debug
