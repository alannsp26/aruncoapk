name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/kivy/buildozer:latest
      options: --user root
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Buildozer
        run: |
          # 1. Install prerequisites for adding PPAs
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          
          # 2. Add Deadsnakes PPA to access older Python versions like 3.11
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          
          # 3. Install Python 3.11 and development headers
          sudo apt-get install -y python3.11 python3.11-dev python3.11-venv
          
          # 4. Clear old cached builds to prevent artifact contamination
          rm -rf .buildozer
          
          # 5. Pin Cython to the version required by Kivy 2.3.0 using the 3.11 context
          /usr/bin/python3.11 -m pip install Cython==0.29.33
          
          # 6. Run buildozer explicitly through the python3.11 binary
          yes y | BUILDOZER_ALLOW_ROOT=1 /usr/bin/python3.11 -m buildozer android debug
