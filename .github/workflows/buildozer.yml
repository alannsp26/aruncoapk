name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/kivy/buildozer:latest
      options: --user root
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Buildozer
        env:
          # This prevents apt-get from freezing the build to ask for user input (like timezone)
          DEBIAN_FRONTEND: noninteractive 
        run: |
          # 1. Install Python 3.11 safely
          apt-get update
          apt-get install -y software-properties-common
          add-apt-repository -y ppa:deadsnakes/ppa
          apt-get update
          apt-get install -y python3.11 python3.11-dev python3.11-venv
          
          # 2. Clear out any bad cache artifacts
          rm -rf .buildozer
          
          # 3. Create the Virtual Environment
          python3.11 -m venv my_build_env
          
          # 4. PATH Override: The ultimate lock. 
          # This guarantees Buildozer and ALL its background subprocesses ONLY see Python 3.11.
          export PATH="$(pwd)/my_build_env/bin:$PATH"
          
          # 5. Install dependencies cleanly into the Virtual Environment
          pip install Cython==0.29.33
          pip install buildozer
          
          # 6. Execute the build process safely
          yes y | BUILDOZER_ALLOW_ROOT=1 buildozer android debug

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
