name: Build APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libgdbm-dev libsqlite3-dev libbz2-dev libffi-dev tk-dev uuid-dev libpng-dev libjpeg-dev

      - name: Build with Buildozer
        working-directory: .  # Change this if your code is in a sub-folder
        run: |
          pip install buildozer
          # Use python3 -m to ensure it finds the package
          python3 -m buildozer android debug

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
