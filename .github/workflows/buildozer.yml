name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      # Use a stable, older tag or ensure the container environment is handled
      # If 'latest' is 3.14, we need to explicitly create a 3.11 venv
      image: ghcr.io/kivy/buildozer:latest
      options: --user root
    steps:
#______________________________________________________________________________________________________________    
      - name: Checkout code
        uses: actions/checkout@v4
#______________________________________________________________________________________________________________  
      - name: Setup Python 3.11 and Build Environment
        run: |
          # Add the deadsnakes PPA to get access to python3.11
          apt-get update
          apt-get install -y software-properties-common
          add-apt-repository -y ppa:deadsnakes/ppa
          apt-get update
          
          # Now install python3.11
          apt-get install -y python3.11 python3.11-venv
          
          # Create and use the venv
          python3.11 -m venv /opt/venv
          export PATH="/opt/venv/bin:$PATH"
          
          # Install dependencies
          pip install --upgrade pip
          pip install "Cython==0.29.33" "buildozer"
#______________________________________________________________________________________________________________          
      - name: Force NDK version
        run: |
          echo "ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/23.2.8568313" >> $GITHUB_ENV
          echo "NDK_VERSION=23.2.8568313" >> $GITHUB_ENV
#______________________________________________________________________________________________________________            
      - name: Cache Buildozer
        uses: actions/cache@v3
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-buildozer-
#______________________________________________________________________________________________________________        
      - name: Build with Buildozer
        env:
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/23.2.8568313
          ANDROIDNDK: /usr/local/lib/android/sdk/ndk/23.2.8568313
        run: |
          export PATH="/opt/venv/bin:$PATH"
          export _JAVA_OPTIONS="-Xmx3g -XX:+UseG1GC"
          export GRADLE_OPTS="-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"
          rm -rf .buildozer
          yes y | BUILDOZER_ALLOW_ROOT=1 buildozer android debug || true
#______________________________________________________________________________________________________________  
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
